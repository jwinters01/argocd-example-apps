apiVersion: v1
kind: ServiceAccount
metadata:
  name: ownerref-injector
  namespace: helm-guestbook-promotion
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ownerref-injector
  namespace: helm-guestbook-promotion
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - apiGroups: ["promoter.argoproj.io"]
    resources: ["promotionstrategies"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ownerref-injector
  namespace: helm-guestbook-promotion
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ownerref-injector
subjects:
  - kind: ServiceAccount
    name: ownerref-injector
    namespace: helm-guestbook-promotion
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ownerref-injector
  namespace: helm-guestbook-promotion
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: ownerref-injector
      restartPolicy: Never
      containers:
        - name: injector
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              PARENT_UID=$(kubectl get configmap promotion-strategy-generator \
                -n helm-guestbook-promotion \
                -o jsonpath='{.metadata.uid}')
              echo "Parent UID: ${PARENT_UID}"
              kubectl patch promotionstrategy demo-github \
                -n helm-guestbook-promotion \
                --type=json \
                -p="[{\"op\":\"replace\",\"path\":\"/metadata/ownerReferences\",\"value\":[{\"apiVersion\":\"v1\",\"kind\":\"ConfigMap\",\"name\":\"promotion-strategy-generator\",\"uid\":\"${PARENT_UID}\",\"blockOwnerDeletion\":false,\"controller\":true}]}]" \
                || kubectl patch promotionstrategy demo-github \
                     -n helm-guestbook-promotion \
                     --type=json \
                     -p="[{\"op\":\"add\",\"path\":\"/metadata/ownerReferences\",\"value\":[{\"apiVersion\":\"v1\",\"kind\":\"ConfigMap\",\"name\":\"promotion-strategy-generator\",\"uid\":\"${PARENT_UID}\",\"blockOwnerDeletion\":false,\"controller\":true}]}]"
              echo "ownerReference injected successfully"
