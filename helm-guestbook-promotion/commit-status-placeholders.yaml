apiVersion: promoter.argoproj.io/v1alpha1
kind: CommitStatus
metadata:
  name: integration-tests-passing
  namespace: helm-guestbook-promotion
  labels:
    promoter.argoproj.io/commit-status: integration-tests-passing
spec:
  gitRepositoryRef:
    name: github-argocd-example-apps
  # The SHA will be set by the controller for the current commit being promoted
  name: integration-tests-passing
  description: Placeholder for integration tests passing. Set to success by CI or timer.
  phase: success
