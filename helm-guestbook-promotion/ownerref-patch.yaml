apiVersion: v1
kind: ServiceAccount
metadata:
  name: ownerref-patch
  namespace: helm-guestbook-promotion
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ownerref-patch
  namespace: helm-guestbook-promotion
rules:
  - apiGroups: ["promoter.argoproj.io"]
    resources: ["gitrepositories"]
    verbs: ["get"]
  - apiGroups: ["promoter.argoproj.io"]
    resources: ["promotionstrategies"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ownerref-patch
  namespace: helm-guestbook-promotion
subjects:
  - kind: ServiceAccount
    name: ownerref-patch
    namespace: helm-guestbook-promotion
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: ownerref-patch
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ownerref-patch
  namespace: helm-guestbook-promotion
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: ownerref-patch
      restartPolicy: OnFailure
      containers:
        - name: patch
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              UID=$(kubectl get gitrepository github-argocd-example-apps \
                -n helm-guestbook-promotion \
                -o jsonpath='{.metadata.uid}')
              kubectl patch promotionstrategy demo-github \
                -n helm-guestbook-promotion \
                --type=merge \
                -p "{\"metadata\":{\"ownerReferences\":[{\"apiVersion\":\"promoter.argoproj.io/v1alpha1\",\"kind\":\"GitRepository\",\"name\":\"github-argocd-example-apps\",\"uid\":\"${UID}\",\"controller\":false,\"blockOwnerDeletion\":false}]}}"
