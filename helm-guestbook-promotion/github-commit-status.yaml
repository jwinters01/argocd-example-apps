# Creates a check on the promotion PR based on whether the PR meets GitHub's merge
# requirements (required reviews, status checks, etc.) using the pull request
# endpoint's mergeable_state field.
#
# GitHub GET /repos/{owner}/{repo}/pulls/{pull_number} returns:
#   mergeable_state: "clean" = PR meets all merge requirements (reviews, checks);
#                    "blocked" = not yet (e.g. pending reviews or failing checks);
#                    "unknown" = still computing (retry later).
#
# Prerequisites:
# 1. Create a Secret with a GitHub PAT (repo scope) in key "token".
# 2. Add the key to your PromotionStrategy's proposedCommitStatuses.
#
apiVersion: promoter.argoproj.io/v1alpha1
kind: WebRequestCommitStatus
metadata:
  name: github-pr-approval
  namespace: default
spec:
  promotionStrategyRef:
    name: my-app   # change to your PromotionStrategy name

  key: github-pr-approval

  descriptionTemplate: |
    {{- if .ResponseData }}
    {{ .Phase }}: {{ .ResponseData.mergeable_state | default "—" }}
    {{- else }}
    Checking GitHub merge requirements
    {{- end }}

  urlTemplate: "{{ .Environment.PullRequest.Url }}"

  reportOn: proposed

  httpRequest:
    # Single GitHub API call: get PR; mergeable_state reflects all merge requirements.
    urlTemplate: "https://api.github.com/repos/{{ index (splitList \"/\" (trimPrefix \"https://github.com\" .Environment.PullRequest.Url)) 1 }}/{{ index (splitList \"/\" (trimPrefix \"https://github.com\" .Environment.PullRequest.Url)) 2 }}/pulls/{{ .Environment.PullRequest.ID }}"
    method: GET
    headerTemplates:
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
    timeout: 30s
    authentication:
      bearer:
        secretRef:
          name: github-token   # Secret with key "token" = GitHub PAT (repo scope)

  # clean = meets all merge requirements (reviews, status checks). blocked = not yet. unknown = computing.
  expression: |
    Response.StatusCode == 200 &&
    Response.Body.mergeable_state == "clean"

  mode:
    trigger:
      requeueDuration: 2m
      triggerExpression: |
        Environment.PullRequest != nil &&
        string(Environment.PullRequest.State) == "open"
      responseExpression: |
        {
          mergeable_state: Response.Body.mergeable_state ?? "unknown",
          mergeable: Response.Body.mergeable
        }