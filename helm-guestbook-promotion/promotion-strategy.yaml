apiVersion: promoter.argoproj.io/v1alpha1
kind: PromotionStrategy
metadata:
  name: demo-github
  namespace: helm-guestbook-promotion
spec:
  activeCommitStatuses:
    # The ArgoCDCommitStatus CR will maintain this commit status based on the application health.
    - key: argocd-health
  previousEnvironmentCommitStatus:
    url:
      # Deep link into the promoter UI, highlighting the previous environment's card.
      template: >-
        http://localhost:4000/applications/argocd/example.helm-guestbook-promotion?resource=&view=GitOps+Promoter&env={{ urlQueryEscape .PreviousEnvironmentBranch }}&promotionstrategy={{ urlQueryEscape (printf "%s/%s" .PromotionStrategy.Namespace .PromotionStrategy.Name) }}
  environments:
    - autoMerge: true
      branch: environment/development
    - autoMerge: true
      branch: environment/staging
    - autoMerge: false
      branch: environment/prod
  gitRepositoryRef:
    name: github-argocd-example-apps
---
apiVersion: promoter.argoproj.io/v1alpha1
kind: PromotionStrategy
metadata:
  name: demo-github-2
  namespace: helm-guestbook-promotion
spec:
  activeCommitStatuses:
    - key: argocd-health
  previousEnvironmentCommitStatus:
    url:
      # Deep link into the promoter UI, highlighting the previous environment's card.
      template: >-
        http://localhost:4000/applications/argocd/example.helm-guestbook-promotion?resource=&view=GitOps+Promoter&env={{ urlQueryEscape .PreviousEnvironmentBranch }}&promotionstrategy={{ urlQueryEscape (printf "%s/%s" .PromotionStrategy.Namespace .PromotionStrategy.Name) }}
  environments:
    - autoMerge: false
      branch: environment/alpha
    - autoMerge: false
      branch: environment/beta
    - autoMerge: false
      branch: environment/gamma
  gitRepositoryRef:
    name: github-argocd-example-apps
